{% extends 'base.html' %}

{% block title}Category Lists{% endblock}

{% block content %}
<table>
    <tr>
        <th>Name</th>
        <th>description</th>
    </tr>
    
    {% for category in categories %}

    <tr>
        <td><a href="{% url 'category_tasks' category.id %}">{{ category.name }}</a></td> 
        <td>{{ category.description }}</td>
    </tr>
    {% endfor %}

</table>

{% endblock %}
